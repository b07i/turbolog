<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage — Car Maintenance Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f4f0;
    --bg3: #eceae4;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #9e9d98;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 10px;
    --radius-lg: 14px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0ede6;
      --text2: #9e9d98;
      --text3: #6b6a65;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
    }
  }

  body { font-family: var(--font); background: var(--bg2); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; flex-wrap: wrap; gap: 8px; }
  h1 { font-size: 26px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; }
  h1 svg { width: 28px; height: 28px; }
  .sub { font-size: 14px; color: var(--text2); margin-bottom: 1.75rem; }

  .lang-switcher { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg); }
  .lang-btn { padding: 6px 13px; font-size: 13px; font-family: var(--font); cursor: pointer; background: transparent; border: none; color: var(--text2); transition: background .15s; }
  .lang-btn.active { background: var(--bg3); color: var(--text); font-weight: 500; }

  .tabs { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; width: fit-content; background: var(--bg); }
  .tab { padding: 9px 22px; font-size: 14px; cursor: pointer; background: transparent; border: none; color: var(--text2); font-family: var(--font); transition: background .15s; }
  .tab.active { background: var(--bg3); color: var(--text); font-weight: 500; }

  .pane { display: none; } .pane.active { display: block; }

  .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 1rem; }

  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 500px) { .g2, .g3 { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 13px; color: var(--text2); font-weight: 500; }
  .field input, .field select { padding: 8px 11px; font-size: 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: var(--font); width: 100%; transition: border-color .15s; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--border2); background: var(--bg); }

  .btn-row { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
  .btn { padding: 9px 20px; font-size: 14px; font-family: var(--font); border-radius: var(--radius); cursor: pointer; transition: all .15s; font-weight: 500; }
  .btn-p { background: var(--text); color: var(--bg); border: none; }
  .btn-p:hover { opacity: .82; }
  .btn-s { background: transparent; color: var(--text); border: 1px solid var(--border2); }
  .btn-s:hover { background: var(--bg2); }

  /* Car card collapsible */
  .car-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1rem; overflow: hidden; }

  .car-summary { display: grid; grid-template-columns: 44px 1fr 20px; align-items: start; gap: 12px; padding: 1rem 1.25rem; cursor: pointer; user-select: none; transition: background .1s; }
  .car-summary:hover { background: var(--bg2); }

  .car-ico { width: 44px; height: 44px; border-radius: var(--radius); background: var(--bg2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .car-ico svg { width: 22px; height: 22px; color: var(--text2); }

  .car-info { min-width: 0; }
  .car-name { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .car-meta { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .car-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
  .pill { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
  .pill-over { background: #FCEBEB; color: #A32D2D; }
  .pill-soon { background: #FAEEDA; color: #854F0B; }
  .pill-neutral { background: var(--bg3); color: var(--text2); }

  .car-chevron { color: var(--text3); transition: transform .2s; padding-top: 3px; }
  .car-chevron svg { width: 18px; height: 18px; display: block; }
  .car-card.open .car-chevron { transform: rotate(180deg); }

  .car-body { display: none; border-top: 1px solid var(--border); padding: 1rem 1.25rem 1.25rem; }
  .car-card.open .car-body { display: block; }

  .car-actions { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .action-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; background: transparent; border: 1px solid var(--border2); color: var(--text2); font-family: var(--font); transition: all .15s; }
  .action-btn:hover { background: var(--bg2); color: var(--text); }
  .action-btn.danger:hover { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }

  .mitem { display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 12px; padding: .7rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 7px; background: var(--bg2); transition: background .1s; }
  .mitem:hover { background: var(--bg3); }
  .micon { color: var(--text2); flex-shrink: 0; }
  .micon svg { width: 18px; height: 18px; display: block; }
  .mname { font-size: 13px; font-weight: 500; color: var(--text); }
  .msub { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
  .mright { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
  .badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .b-ok   { background: #EAF3DE; color: #3B6D11; }
  .b-soon { background: #FAEEDA; color: #854F0B; }
  .b-over { background: #FCEBEB; color: #A32D2D; }
  .b-unk  { background: var(--bg3); color: var(--text2); }
  .logbtn { font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer; background: var(--bg); border: 1px solid var(--border2); color: var(--text2); font-family: var(--font); transition: all .15s; }
  .logbtn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
  .pbar { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .pfill { height: 100%; border-radius: 2px; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
  .empty svg { width: 40px; height: 40px; opacity: .3; margin: 0 auto 12px; display: block; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; width: min(400px, 100%); border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
  .modal .field { margin-bottom: 12px; }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--bg); padding: 9px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>

      <div class="g2">

        <div class="field"><label id="lbl-mileage"></label><input id="f-mileage" type="number" placeholder="45000"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title" id="lbl-license"></div>
      <div class="g2">
        <div class="field"><label id="lbl-plate"></label><input id="f-plate" type="text" placeholder="AB 12 CDE"></div>
        <div class="field"><label id="lbl-vin"></label><input id="f-vin" type="text" placeholder="1HGCM826..."></div>
      </div>

        <div class="field"><label id="lbl-purchase"></label><input id="f-purchase" type="date"></div>
        <div class="field"><label id="lbl-nick"></label><input id="f-nick" type="text" placeholder="The Beast..."></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="switchTab('my')" id="btn-cancel-add"></button>
      <button class="btn btn-p" onclick="addCar()" id="btn-savecar"></button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="m-title"></h3>
    <div class="field"><label id="lbl-svcdate"></label><input id="m-date" type="date"></div>
    <div class="field"><label id="lbl-svckm"></label><input id="m-km" type="number" placeholder="44200"></div>
    <div class="field"><label id="lbl-svcnotes"></label><input id="m-notes" type="text"></div>
    <div class="btn-row">

    </div>

</div>

<div class="overlay" id="km-overlay">

    <h3 id="lbl-update-mileage-title"></h3>

</div>

function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ cars: cars, logs: logs, uid: uid })); }
  catch(e) { showToast('Warning: could not save.'); }
}

function loadData() {
  try {
    var sl = localStorage.getItem('garage-lang');
    if (sl) lang = sl;
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { var d = JSON.parse(raw); cars = d.cars||[]; logs = d.logs||{}; uid = d.uid||Date.now(); }
  } catch(e) {}
  applyTranslations();
  renderGarage();
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2200);
}

function switchTab(tab) {
  ['my','add'].forEach(function(x) {
    document.getElementById('tab-'+x).classList.toggle('active', x===tab);
    document.getElementById('pane-'+x).classList.toggle('active', x===tab);
  });
  if (tab === 'my') renderGarage();
}

function addCar() {
  var year = document.getElementById('f-year').value;
  var make = document.getElementById('f-make').value.trim();
  var model = document.getElementById('f-model').value.trim();
  if (!year||!make||!model) { alert(t('alertFillFields')); return; }
  var car = {
    id: uid++, year: year, make: make, model: model,
    trim: document.getElementById('f-trim').value.trim(),
    color: document.getElementById('f-color').value.trim(),
    fuel: document.getElementById('f-fuel').value,
    trans: document.getElementById('f-trans').value,
    engine: document.getElementById('f-engine').value.trim(),
    mileage: parseInt(document.getElementById('f-mileage').value)||0,
    plate: document.getElementById('f-plate').value.trim(),
    vin: document.getElementById('f-vin').value.trim(),
    purchase: document.getElementById('f-purchase').value,
    nick: document.getElementById('f-nick').value.trim(),
  };
  cars.push(car); logs[car.id] = {}; collapsed[car.id] = false;
  persist();
  ['f-year','f-make','f-model','f-trim','f-color','f-engine','f-mileage','f-plate','f-vin','f-nick'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('f-fuel').value=''; document.getElementById('f-trans').value=''; document.getElementById('f-purchase').value='';
  showToast(t('toastCarSaved'));
  switchTab('my');
}

function getStatus(ci, item) {
  var car = cars[ci], log = (logs[car.id]||{})[item.id];
  if (!log) return { label: t('statusNotLogged'), cls: 'b-unk', pct: 0 };
  var worst = 0;
  if (item.days) worst = Math.max(worst, ((Date.now() - new Date(log.date).getTime()) / 86400000) / item.days);
  if (item.km && log.km) worst = Math.max(worst, (car.mileage - parseInt(log.km)) / item.km);
  if (!item.days && !item.km) return { label: t('statusLogged'), cls: 'b-ok', pct: 0 };
  worst = Math.min(worst, 1);
  if (worst >= 1)    return { label: t('statusOverdue'), cls: 'b-over', pct: worst };
  if (worst >= 0.75) return { label: t('statusSoon'),    cls: 'b-soon', pct: worst };
  return { label: t('statusOk'), cls: 'b-ok', pct: worst };
}

function toggleCar(carId) {
  collapsed[carId] = !collapsed[carId];
  var el = document.getElementById('car-' + carId);
  if (el) el.classList.toggle('open', !collapsed[carId]);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderGarage() {
  var el = document.getElementById('garage');
  if (!cars.length) {
    el.innerHTML = '<div class="empty">' + carSvg() + esc(t('emptyGarage')) + '</div>';
    return;
  }
  var html = '';
  for (var ci = 0; ci < cars.length; ci++) {
    var car = cars[ci], carLogs = logs[car.id]||{};
    var overdue=0, soon=0, logged=Object.keys(carLogs).length;
    for (var i=0;i<ITEMS.length;i++) {
      var s=getStatus(ci,ITEMS[i]);
      if(s.label===t('statusOverdue')) overdue++;
      else if(s.label===t('statusSoon')) soon++;
    }
    var isOpen = collapsed[car.id] === false ? true : !collapsed[car.id];
    var dn = car.nick || (car.year + ' ' + car.make + ' ' + car.model);
    var meta = [car.fuel, car.engine, car.trans, car.plate].filter(Boolean).join(' · ');
    if (car.mileage) meta += (meta?' · ':'') + parseInt(car.mileage).toLocaleString() + ' km';

    var pills = '';
    if (overdue) pills += '<span class="pill pill-over">' + overdue + ' ' + t('statOverdue') + '</span>';
    if (soon)    pills += '<span class="pill pill-soon">'  + soon    + ' ' + t('statSoon')    + '</span>';
    pills += '<span class="pill pill-neutral">' + logged + '/' + ITEMS.length + ' ' + t('statLogged') + '</span>';

    html += '<div class="car-card' + (isOpen?' open':'') + '" id="car-' + car.id + '">';
    html += '<div class="car-summary" onclick="toggleCar(' + car.id + ')">';
    html += '<div class="car-ico">' + carSvg() + '</div>';
    html += '<div class="car-info"><div class="car-name">' + esc(dn) + '</div>';
    if (meta) html += '<div class="car-meta">' + esc(meta) + '</div>';
    html += '<div class="car-pills">' + pills + '</div></div>';
    html += '<div class="car-chevron">' + chevSvg() + '</div>';
    html += '</div>';

    html += '<div class="car-body">';
    html += '<div class="car-actions">';
    html += '<button class="action-btn" onclick="openKmModal(' + ci + ')">' + t('btnUpdateMileage') + '</button>';
    html += '<button class="action-btn danger" onclick="deleteCar(' + ci + ')">' + t('btnRemove') + '</button>';
    html += '</div>';

    for (var j=0;j<ITEMS.length;j++) {
      var item=ITEMS[j], log=carLogs[item.id], st=getStatus(ci,item);
      var intStr = item.km ? t('everyKm',{km:item.km.toLocaleString()}) : item.days ? t('everyMonths',{n:Math.round(item.days/30)}) : '';
      var lastStr = log
        ? (t('lastService')+': '+log.date+(log.km?' '+t('atKm')+' '+parseInt(log.km).toLocaleString()+' km':'')+(log.notes?' · '+esc(log.notes):''))
        : intStr;
      var barColor = st.cls==='b-over'?'#E24B4A':st.cls==='b-soon'?'#EF9F27':'#639922';
      var pctW = Math.round(st.pct*100);
      html += '<div class="mitem">';
      html += '<div class="micon">'+svgIcon(item.id)+'</div>';
      html += '<div><div class="mname">'+esc(iname(item))+'</div>';
      html += '<div class="msub">'+lastStr+'</div>';
      if(pctW>0) html+='<div class="pbar"><div class="pfill" style="width:'+pctW+'%;background:'+barColor+'"></div></div>';
      html += '</div><div class="mright">';
      html += '<span class="badge '+st.cls+'">'+st.label+'</span>';
      html += '<button class="logbtn" onclick="openModal('+ci+',\''+item.id+'\')">'+t('btnLogService')+'</button>';
      html += '</div></div>';
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function openModal(ci, itemId) {
  editing.ci=ci; editing.itemId=itemId;
  var item=null; for(var i=0;i<ITEMS.length;i++){if(ITEMS[i].id===itemId){item=ITEMS[i];break;}}
  var log=(logs[cars[ci].id]||{})[itemId]||{};
  document.getElementById('m-title').textContent = t('logPrefix') + iname(item);
  document.getElementById('m-date').value  = log.date  || new Date().toISOString().split('T')[0];
  document.getElementById('m-km').value    = log.km    || cars[ci].mileage || '';
  document.getElementById('m-notes').value = log.notes || '';
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function saveLog() {
  var ci=editing.ci, itemId=editing.itemId, carId=cars[ci].id;
  if(!logs[carId]) logs[carId]={};
  logs[carId][itemId]={ date:document.getElementById('m-date').value, km:document.getElementById('m-km').value, notes:document.getElementById('m-notes').value.trim() };
  persist(); showToast(t('toastServiceLogged')); closeModal(); renderGarage();
}

function deleteCar(ci) {
  var car=cars[ci], name=car.nick||(car.year+' '+car.make+' '+car.model);
  if(!confirm(t('confirmRemove',{name:name}))) return;
  delete logs[car.id]; cars.splice(ci,1); persist(); showToast(t('toastCarRemoved')); renderGarage();
}

function openKmModal(ci) {
  editingKm=ci;
  document.getElementById('km-input').value=cars[ci].mileage||'';
  document.getElementById('km-overlay').classList.add('open');
}
function closeKmModal() { document.getElementById('km-overlay').classList.remove('open'); }
function saveKm() {
  var km=parseInt(document.getElementById('km-input').value);
  if(!km||km<0){alert(t('alertValidMileage'));return;}
  cars[editingKm].mileage=km; persist(); showToast(t('toastMileageUpdated')); closeKmModal(); renderGarage();
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('km-overlay').addEventListener('click',function(e){if(e.target===this)closeKmModal();});

loadData();
</script>
